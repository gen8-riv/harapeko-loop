<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>はらぺこループ</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    /* ===== リセット & ベース ===== */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
      background: #F7F7F7;
      color: #2D2D2D;
      max-width: 480px;
      margin: 0 auto;
      min-height: 100dvh;
      position: relative;
      overflow-x: hidden;
    }

    /* ===== ヘッダー ===== */
    .header {
      background: #FFFFFF;
      color: #2D2D2D;
      padding: 14px 20px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid #EFEFEF;
    }
    .header h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    .header-emoji {
      font-size: 20px;
      margin-right: 4px;
    }

    /* ===== モード切替トグル ===== */
    .mode-toggle {
      display: flex;
      background: #EFEFEF;
      border-radius: 12px;
      padding: 4px;
      margin: 12px 16px;
      gap: 4px;
    }
    .mode-btn {
      flex: 1;
      border: none;
      background: transparent;
      padding: 8px 8px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      color: #AAAAAA;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .mode-btn.active {
      background: white;
      color: #E8623E;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    /* ===== タイムライン ===== */
    .page { display: none; padding-bottom: 80px; }
    .page.active { display: block; }

    .mode-description {
      text-align: center;
      font-size: 11px;
      color: #AAAAAA;
      margin: -4px 16px 12px;
      line-height: 1.5;
      transition: opacity 0.3s ease;
    }

    .timeline {
      padding: 0 16px 16px;
      transition: transform 0.3s ease, opacity 0.3s ease;
    }
    .timeline.slide-left {
      animation: slideOutLeft 0.25s ease forwards;
    }
    .timeline.slide-right {
      animation: slideOutRight 0.25s ease forwards;
    }
    .timeline.slide-in-left {
      animation: slideInFromRight 0.25s ease forwards;
    }
    .timeline.slide-in-right {
      animation: slideInFromLeft 0.25s ease forwards;
    }
    @keyframes slideOutLeft {
      from { transform: translateX(0); opacity: 1; }
      to { transform: translateX(-40px); opacity: 0; }
    }
    @keyframes slideOutRight {
      from { transform: translateX(0); opacity: 1; }
      to { transform: translateX(40px); opacity: 0; }
    }
    @keyframes slideInFromRight {
      from { transform: translateX(40px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideInFromLeft {
      from { transform: translateX(-40px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    /* ===== 投稿カード共通 ===== */
    .card {
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
      background: #FFFFFF;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
      transition: transform 0.2s;
    }
    .card:active {
      transform: scale(0.98);
    }

    /* 空腹カード */
    .card-hungry {
      border-left: 3px solid #E8623E;
    }

    /* 満腹カード（ループ完成） */
    .card-full {
      border-left: 3px solid #5BAD6F;
    }

    .card-user {
      display: flex;
      align-items: center;
      margin-bottom: 12px;
    }
    .card-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #F5F0ED;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      margin-right: 8px;
      flex-shrink: 0;
    }
    .card-nickname {
      font-weight: 600;
      font-size: 14px;
    }
    .card-time {
      font-size: 12px;
      color: #A09890;
      margin-left: auto;
    }

    /* 空腹ステータスバッジ */
    .status-badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 10px;
      margin-bottom: 8px;
    }
    .badge-hungry {
      background: #FFF0EB;
      color: #E8623E;
    }
    .badge-full {
      background: #EDF7EF;
      color: #5BAD6F;
    }

    .card-text {
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 8px;
    }
    .card-hungry-text {
      color: #2D2D2D;
    }

    /* ループ完成のビフォーアフター */
    .loop-pair {
      margin-top: 8px;
    }
    .loop-step {
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 8px;
    }
    .loop-step-hungry {
      background: #FFF6F3;
    }
    .loop-step-full {
      background: #F2F9F3;
    }
    .loop-step-label {
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .loop-step-hungry .loop-step-label { color: #E8623E; }
    .loop-step-full .loop-step-label { color: #5BAD6F; }
    .loop-step-text {
      font-size: 14px;
      line-height: 1.5;
    }
    /* ループモード：未完ループカード */
    .card-loop-pending {
      background: #FFFFFF;
      border: 1.5px dashed #DDD;
      border-left: 3px solid #E8623E;
      position: relative;
    }
    .loop-pending-footer {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
      padding: 8px 12px;
      background: #FFF6F3;
      border-radius: 10px;
      font-size: 13px;
      color: #E8623E;
      font-weight: 600;
    }
    .loop-pending-dots {
      display: inline-flex;
      gap: 4px;
    }
    .loop-pending-dots span {
      width: 4px;
      height: 4px;
      background: #E8623E;
      border-radius: 50%;
      animation: dotPulse 1.4s infinite;
    }
    .loop-pending-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loop-pending-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dotPulse {
      0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1.2); }
    }

    /* ループモード：完成ループカード強化 */
    .card-loop-complete {
      border: none;
      box-shadow: 0 1px 6px rgba(91, 173, 111, 0.1);
    }
    .loop-complete-header {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      font-weight: 700;
      color: #5BAD6F;
      margin-bottom: 12px;
      padding: 4px 12px;
      background: #EDF7EF;
      border-radius: 8px;
      width: fit-content;
    }
    .loop-duration {
      font-size: 12px;
      color: #999;
      text-align: center;
      margin: 4px 0;
    }

    .loop-arrow {
      text-align: center;
      margin: 4px 0;
      color: #CCC;
      font-size: 14px;
      line-height: 1;
    }

    /* 写真プレースホルダー */
    .card-photo {
      width: 100%;
      height: 180px;
      border-radius: 12px;
      object-fit: cover;
      margin-top: 8px;
      background: #F0F0F0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
    }

    /* 経過時間 */
    .elapsed-time {
      font-size: 12px;
      color: #E8623E;
      font-weight: 600;
      margin-top: 4px;
    }

    /* リアクション */
    .reactions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    .reaction-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      background: rgba(255,255,255,0.7);
      border: 1.5px solid #E0E0E0;
      border-radius: 10px;
      padding: 4px 12px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .reaction-btn:hover {
      border-color: #E8623E;
      transform: scale(1.05);
    }
    .reaction-btn.reacted {
      border-color: #E8623E;
      background: #FFF6F3;
    }
    .reaction-count {
      font-size: 12px;
      color: #666;
      font-weight: 600;
    }

    /* ===== ボトムナビ ===== */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      background: white;
      display: flex;
      align-items: center;
      justify-content: space-around;
      padding: 8px 0;
      padding-bottom: max(8px, env(safe-area-inset-bottom));
      box-shadow: 0 -2px 12px rgba(0,0,0,0.08);
      z-index: 100;
    }
    .nav-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      border: none;
      background: none;
      cursor: pointer;
      padding: 4px 16px;
      color: #BBB;
      transition: color 0.2s;
    }
    .nav-btn.active { color: #2D2D2D; }
    .nav-btn-icon { font-size: 24px; }
    .nav-btn-label { font-size: 10px; font-weight: 600; margin-top: 2px; }

    /* 中央の投稿ボタン */
    .nav-post-btn {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: #E8623E;
      border: 3px solid white;
      color: white;
      font-size: 26px;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(232, 98, 62, 0.3);
      margin-top: -22px;
      transition: transform 0.2s, box-shadow 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .nav-post-btn:hover {
      transform: scale(1.08);
      box-shadow: 0 4px 12px rgba(232, 98, 62, 0.35);
    }
    .nav-post-btn:active {
      transform: scale(0.95);
    }

    /* ===== 投稿モーダル ===== */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 200;
      justify-content: center;
      align-items: flex-end;
    }
    .modal-overlay.show {
      display: flex;
    }
    .modal {
      background: white;
      border-radius: 24px 24px 0 0;
      width: 100%;
      max-width: 480px;
      padding: 24px 20px;
      padding-bottom: max(24px, env(safe-area-inset-bottom));
      max-height: 85dvh;
      overflow-y: auto;
      animation: slideUp 0.3s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }
    .modal-handle {
      width: 40px;
      height: 4px;
      background: #DDD;
      border-radius: 2px;
      margin: 0 auto 16px;
    }
    .modal-title {
      font-size: 20px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 20px;
    }
    .modal-title-hungry { color: #E8623E; }
    .modal-title-full { color: #5BAD6F; }

    .form-group {
      margin-bottom: 16px;
    }
    .form-label {
      font-size: 13px;
      font-weight: 600;
      color: #666;
      margin-bottom: 6px;
      display: block;
    }
    .form-textarea {
      width: 100%;
      min-height: 100px;
      border: 2px solid #E0E0E0;
      border-radius: 12px;
      padding: 12px;
      font-size: 15px;
      font-family: inherit;
      resize: vertical;
      transition: border-color 0.2s;
    }
    .form-textarea:focus {
      outline: none;
      border-color: #E8623E;
    }
    .form-textarea.full-mode:focus {
      border-color: #5BAD6F;
    }
    .char-count {
      text-align: right;
      font-size: 12px;
      color: #999;
      margin-top: 4px;
    }
    .char-count.over { color: #E53935; }

    .photo-upload {
      width: 100%;
      height: 120px;
      border: 2px dashed #DDD;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      color: #BBB;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .photo-upload:hover {
      border-color: #E8623E;
      background: #FFF6F3;
    }
    .photo-upload-icon { font-size: 32px; }
    .photo-upload-text { font-size: 13px; }
    .photo-preview-container {
      position: relative;
      width: 100%;
      border-radius: 12px;
      overflow: hidden;
    }
    .photo-preview {
      width: 100%;
      max-height: 200px;
      object-fit: cover;
      border-radius: 12px;
      display: block;
    }
    .photo-remove {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: rgba(0,0,0,0.5);
      color: white;
      border: none;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    /* タイムライン上の投稿写真 */
    .card-image {
      width: 100%;
      max-height: 240px;
      object-fit: cover;
      border-radius: 12px;
      margin-top: 10px;
    }

    .submit-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      color: white;
      cursor: pointer;
      margin-top: 8px;
      transition: transform 0.2s, opacity 0.2s;
    }
    .submit-btn:hover { opacity: 0.9; }
    .submit-btn:active { transform: scale(0.98); }
    .submit-btn-hungry { background: #E8623E; }
    .submit-btn-full { background: #5BAD6F; }

    .cancel-btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 12px;
      background: #F5F5F5;
      font-size: 14px;
      color: #999;
      cursor: pointer;
      margin-top: 8px;
    }

    /* ===== マイページ ===== */
    .mypage {
      padding: 20px 16px;
    }
    .profile-card {
      background: white;
      border-radius: 16px;
      padding: 24px;
      text-align: center;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      margin-bottom: 20px;
    }
    .profile-avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: #F0F0F0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      margin: 0 auto 12px;
    }
    .profile-nickname {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .profile-stats {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-top: 16px;
    }
    .stat-item {
      text-align: center;
    }
    .stat-number {
      font-size: 24px;
      font-weight: 700;
      color: #E8623E;
    }
    .stat-label {
      font-size: 11px;
      color: #999;
      margin-top: 2px;
    }

    .section-title {
      font-size: 15px;
      font-weight: 700;
      color: #666;
      margin-bottom: 12px;
      padding-left: 4px;
    }

    /* ===== トースト通知 ===== */
    .toast {
      position: fixed;
      top: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(-20px);
      background: #333;
      color: white;
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      z-index: 300;
      opacity: 0;
      transition: all 0.3s ease;
      pointer-events: none;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ===== 空のタイムライン ===== */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #BBB;
    }
    .empty-state-icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state-text { font-size: 14px; }

    /* ===== カードアニメーション ===== */
    @keyframes cardFadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .card {
      animation: cardFadeIn 0.4s ease forwards;
    }
    .card:nth-child(1) { animation-delay: 0s; }
    .card:nth-child(2) { animation-delay: 0.06s; }
    .card:nth-child(3) { animation-delay: 0.12s; }
    .card:nth-child(4) { animation-delay: 0.18s; }
    .card:nth-child(5) { animation-delay: 0.24s; }
    .card:nth-child(6) { animation-delay: 0.3s; }

    /* ===== モードカウントバッジ ===== */
    .mode-count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 18px;
      height: 18px;
      border-radius: 9px;
      background: #E0E0E0;
      color: #999;
      font-size: 10px;
      font-weight: 700;
      margin-left: 4px;
      padding: 0 5px;
    }
    .mode-btn.active .mode-count {
      background: #E8623E;
      color: white;
    }

    /* ===== マイページ：ループ達成率 ===== */
    .achievement-section {
      background: white;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      margin-bottom: 20px;
    }
    .achievement-title {
      font-size: 13px;
      font-weight: 700;
      color: #666;
      margin-bottom: 12px;
    }
    .progress-bar-container {
      background: #F0F0F0;
      border-radius: 10px;
      height: 20px;
      overflow: hidden;
      position: relative;
    }
    .progress-bar-fill {
      height: 100%;
      border-radius: 10px;
      background: linear-gradient(90deg, #FF6B35, #4CAF50);
      transition: width 0.8s ease;
      min-width: 0;
    }
    .progress-bar-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 11px;
      font-weight: 700;
      color: #333;
    }
    .achievement-detail {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
      font-size: 12px;
      color: #999;
    }

    /* ===== マイページ：ひとこと ===== */
    .profile-bio {
      font-size: 13px;
      color: #888;
      margin-top: 8px;
    }

    /* ===== ログインボタン（マイページ下部） ===== */
    .login-section {
      margin-top: 20px;
    }
    .login-btn {
      width: 100%;
      padding: 14px;
      border: 2px solid #E0E0E0;
      border-radius: 12px;
      background: white;
      font-size: 14px;
      font-weight: 600;
      color: #666;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s;
    }
    .login-btn:hover {
      border-color: #E8623E;
      color: #E8623E;
    }
    .logout-btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 12px;
      background: #F5F5F5;
      font-size: 13px;
      color: #BBB;
      cursor: pointer;
      margin-top: 8px;
    }

    /* ===== 投稿削除ボタン ===== */
    .card-delete {
      border: none;
      background: none;
      color: #CCC;
      font-size: 16px;
      cursor: pointer;
      padding: 4px;
      margin-left: 8px;
      transition: color 0.2s;
    }
    .card-delete:hover {
      color: #E53935;
    }

    /* ===== ログアウトボタン ===== */
    .danger-btn {
      width: 100%;
      padding: 12px;
      border: 1.5px solid #E0E0E0;
      border-radius: 12px;
      background: white;
      font-size: 13px;
      color: #E53935;
      cursor: pointer;
      margin-top: 8px;
      transition: all 0.2s;
    }
    .danger-btn:hover {
      border-color: #E53935;
      background: #FFF5F5;
    }

    /* ===== ローディング ===== */
    .loading-screen {
      position: fixed;
      inset: 0;
      background: #FFF8F0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 500;
      gap: 16px;
    }
    .loading-screen.hidden { display: none; }
    .loading-emoji { font-size: 48px; animation: bounce 1s infinite; }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }
    .loading-text { font-size: 14px; color: #999; font-weight: 600; }

    /* ===== ニックネーム設定モーダル ===== */
    .nickname-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 400;
      justify-content: center;
      align-items: center;
    }
    .nickname-modal.show { display: flex; }
    .nickname-card {
      background: white;
      border-radius: 20px;
      padding: 32px 24px;
      width: 90%;
      max-width: 360px;
      text-align: center;
    }
    .nickname-card h2 {
      font-size: 18px;
      margin-bottom: 8px;
      color: #E8623E;
    }
    .nickname-card p {
      font-size: 13px;
      color: #999;
      margin-bottom: 20px;
    }
    .emoji-picker {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .emoji-option {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 2px solid #E0E0E0;
      background: white;
      font-size: 22px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .emoji-option.selected {
      border-color: #E8623E;
      background: #FFF6F3;
      transform: scale(1.15);
    }
    .nickname-input {
      width: 100%;
      padding: 12px;
      border: 2px solid #E0E0E0;
      border-radius: 12px;
      font-size: 16px;
      font-family: inherit;
      text-align: center;
      margin-bottom: 16px;
      transition: border-color 0.2s;
    }
    .nickname-input:focus {
      outline: none;
      border-color: #E8623E;
    }
  </style>
</head>
<body>

  <!-- ローディング画面 -->
  <div class="loading-screen" id="loading-screen">
    <div class="loading-emoji">🍽️</div>
    <div class="loading-text">はらぺこループを準備中...</div>
  </div>

  <!-- ニックネーム設定モーダル -->
  <div class="nickname-modal" id="nickname-modal">
    <div class="nickname-card">
      <h2>はじめまして！</h2>
      <p>アイコンとニックネームを決めよう</p>
      <div class="emoji-picker" id="emoji-picker">
        <button class="emoji-option selected" data-emoji="😊">😊</button>
        <button class="emoji-option" data-emoji="😤">😤</button>
        <button class="emoji-option" data-emoji="🌸">🌸</button>
        <button class="emoji-option" data-emoji="💪">💪</button>
        <button class="emoji-option" data-emoji="🍳">🍳</button>
        <button class="emoji-option" data-emoji="🐱">🐱</button>
        <button class="emoji-option" data-emoji="🎸">🎸</button>
        <button class="emoji-option" data-emoji="🍜">🍜</button>
      </div>
      <input type="text" class="nickname-input" id="nickname-input" placeholder="ニックネームを入力" maxlength="20">
      <button class="submit-btn submit-btn-hungry" id="btn-save-nickname">はじめる！</button>
    </div>
  </div>

  <!-- ヘッダー -->
  <header class="header">
    <h1><span class="header-emoji">🍽️</span>はらぺこループ</h1>
  </header>

  <!-- トースト通知 -->
  <div class="toast" id="toast"></div>

  <!-- ===== タイムライン ===== -->
  <div class="page active" id="page-timeline">
    <div class="mode-toggle">
      <button class="mode-btn active" data-mode="loop">🔄 ループ <span class="mode-count" id="count-loop"></span></button>
      <button class="mode-btn" data-mode="hungry">🍚 はらぺこ <span class="mode-count" id="count-hungry"></span></button>
      <button class="mode-btn" data-mode="full">😋 まんぷく <span class="mode-count" id="count-full"></span></button>
    </div>
    <div class="mode-description" id="mode-description">空腹→満腹の気持ちの変化を楽しむモード</div>
    <div class="timeline" id="timeline"></div>
  </div>

  <!-- ===== マイページ ===== -->
  <div class="page" id="page-mypage">
    <div class="mypage">
      <div class="profile-card">
        <div class="profile-avatar" id="mypage-avatar">😊</div>
        <div class="profile-nickname" id="mypage-nickname">-</div>
        <div class="profile-bio" id="mypage-bio"></div>
        <div class="profile-stats">
          <div class="stat-item">
            <div class="stat-number" id="my-loop-count">3</div>
            <div class="stat-label">ループ完了</div>
          </div>
          <div class="stat-item">
            <div class="stat-number" id="my-hungry-count">1</div>
            <div class="stat-label">空腹中</div>
          </div>
          <div class="stat-item">
            <div class="stat-number" id="my-days">3</div>
            <div class="stat-label">利用日数</div>
          </div>
        </div>
      </div>

      <div class="section-title">📖 マイループ履歴</div>
      <div id="my-timeline"></div>

      <!-- アカウント操作 -->
      <div class="login-section">
        <button class="login-btn" onclick="showToast('Googleログインは今後対応予定です！')">
          🔑 Googleアカウントと連携
        </button>
        <button class="logout-btn" id="btn-edit-profile">
          ✏️ プロフィールを変更
        </button>
        <button class="danger-btn" id="btn-logout">
          🚪 ログアウト（アプリ内データは削除）
        </button>
      </div>
    </div>
  </div>

  <!-- ===== 投稿モーダル ===== -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-handle"></div>

      <!-- 空腹投稿フォーム -->
      <div id="form-hungry">
        <div class="modal-title modal-title-hungry">🍚 お腹減った！</div>
        <div class="form-group">
          <label class="form-label">今の気持ちを教えて（必須）</label>
          <textarea class="form-textarea" id="hungry-text" placeholder="例：昼ごはん食べそびれた...お腹ぐーぐー鳴ってる😭" maxlength="140"></textarea>
          <div class="char-count"><span id="hungry-char-count">0</span>/140</div>
        </div>
        <div class="form-group">
          <label class="form-label">写真（任意）</label>
          <input type="file" id="hungry-file-input" accept="image/*" style="display:none">
          <div class="photo-upload" id="hungry-photo-upload" onclick="document.getElementById('hungry-file-input').click()">
            <div class="photo-upload-icon">📷</div>
            <div class="photo-upload-text">空の冷蔵庫とか撮って📸</div>
          </div>
          <div id="hungry-photo-preview" style="display:none"></div>
        </div>
        <button class="submit-btn submit-btn-hungry" id="btn-post-hungry">お腹減った！を投稿する 🍚</button>
        <button class="cancel-btn" id="btn-cancel-hungry">やめとく</button>
      </div>

      <!-- 満腹投稿フォーム -->
      <div id="form-full" style="display:none">
        <div class="modal-title modal-title-full">😋 満腹になった！</div>
        <div class="form-group">
          <label class="form-label">何食べた？（必須）</label>
          <textarea class="form-textarea full-mode" id="full-text" placeholder="例：近くのラーメン屋で味噌ラーメン食べた！チャーシュー最高🍜" maxlength="140"></textarea>
          <div class="char-count"><span id="full-char-count">0</span>/140</div>
        </div>
        <div class="form-group">
          <label class="form-label">料理の写真（任意）</label>
          <input type="file" id="full-file-input" accept="image/*" style="display:none">
          <div class="photo-upload" id="full-photo-upload" onclick="document.getElementById('full-file-input').click()">
            <div class="photo-upload-icon">📸</div>
            <div class="photo-upload-text">おいしそうな写真を撮ろう🍽️</div>
          </div>
          <div id="full-photo-preview" style="display:none"></div>
        </div>
        <button class="submit-btn submit-btn-full" id="btn-post-full">満腹になった！を投稿する 😋</button>
        <button class="cancel-btn" id="btn-cancel-full">まだ空腹中...</button>
      </div>
    </div>
  </div>

  <!-- ===== ボトムナビ ===== -->
  <nav class="bottom-nav">
    <button class="nav-btn active" data-page="page-timeline">
      <span class="nav-btn-icon">🏠</span>
      <span class="nav-btn-label">タイムライン</span>
    </button>
    <button class="nav-post-btn" id="btn-open-post">+</button>
    <button class="nav-btn" data-page="page-mypage">
      <span class="nav-btn-icon">👤</span>
      <span class="nav-btn-label">マイページ</span>
    </button>
  </nav>

  <script>
    // ===== Supabase 初期化 =====
    const SUPABASE_URL = 'https://puostipvcfkxrkgnmfwz.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB1b3N0aXB2Y2ZreHJrZ25tZnd6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMTM3NTQsImV4cCI6MjA4OTU4OTc1NH0.EVQwLylrnqpya2kcvp-evPHUx6FxOvLvPW2t-M3Uask';
    const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // ===== 状態管理 =====
    let currentUser = null;
    let currentProfile = null;
    let posts = [];
    let currentMode = 'loop';
    let currentPage = 'page-timeline';
    let myHungryPostId = null;
    let isModeSwitching = false;

    // ===== 経過時間の表示 =====
    function timeAgo(date) {
      const d = typeof date === 'string' ? new Date(date) : date;
      const diff = Date.now() - d.getTime();
      const minutes = Math.floor(diff / 60000);
      if (minutes < 1) return 'たった今';
      if (minutes < 60) return `${minutes}分前`;
      const hours = Math.floor(minutes / 60);
      if (hours < 24) return `${hours}時間前`;
      const days = Math.floor(hours / 24);
      return `${days}日前`;
    }

    // ===== トースト =====
    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2500);
    }

    // ===== 認証 =====
    async function initAuth() {
      const { data: { session } } = await db.auth.getSession();
      if (session) {
        currentUser = session.user;
        await loadProfile();
      } else {
        // 匿名ログイン
        const { data, error } = await db.auth.signInAnonymously();
        if (error) {
          showToast('ログインに失敗しました...');
          console.error(error);
          return;
        }
        currentUser = data.user;
        // 新規ユーザー → ニックネーム設定
        showNicknameModal();
        return;
      }
      hideLoading();
    }

    async function loadProfile() {
      const { data } = await db
        .from('profiles')
        .select('*')
        .eq('id', currentUser.id)
        .single();

      if (data) {
        currentProfile = data;
        updateProfileUI();
        hideLoading();
        await loadPosts();
      } else {
        showNicknameModal();
      }
    }

    function updateProfileUI() {
      if (!currentProfile) return;
      // マイページのプロフィール表示を更新
      document.getElementById('mypage-avatar').textContent = currentProfile.avatar_emoji;
      document.getElementById('mypage-nickname').textContent = currentProfile.nickname;

      // 利用日数を計算（アカウント作成日から）
      if (currentProfile.created_at) {
        const created = new Date(currentProfile.created_at);
        const now = new Date();
        const days = Math.max(1, Math.floor((now - created) / (1000 * 60 * 60 * 24)) + 1);
        document.getElementById('my-days').textContent = days;
      }
    }

    // ===== ニックネーム設定 =====
    let selectedEmoji = '😊';

    function showNicknameModal() {
      document.getElementById('loading-screen').classList.add('hidden');
      document.getElementById('nickname-modal').classList.add('show');
    }

    document.getElementById('emoji-picker').addEventListener('click', (e) => {
      const btn = e.target.closest('.emoji-option');
      if (!btn) return;
      document.querySelectorAll('.emoji-option').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedEmoji = btn.dataset.emoji;
    });

    document.getElementById('btn-save-nickname').addEventListener('click', async () => {
      const nickname = document.getElementById('nickname-input').value.trim();
      if (!nickname) {
        showToast('ニックネームを入力してね！');
        return;
      }

      const isEditingProfile = Boolean(currentProfile);

      const { error } = await db.from('profiles').upsert({
        id: currentUser.id,
        nickname: nickname,
        avatar_emoji: selectedEmoji,
        is_anonymous: currentUser.is_anonymous || false,
      });

      if (error) {
        showToast('保存に失敗しました...');
        console.error(error);
        return;
      }

      currentProfile = {
        ...currentProfile,
        id: currentUser.id,
        nickname,
        avatar_emoji: selectedEmoji,
        created_at: currentProfile?.created_at || new Date().toISOString(),
      };
      document.getElementById('nickname-modal').classList.remove('show');
      updateProfileUI();
      hideLoading();
      await loadPosts();
      showToast(isEditingProfile ? 'プロフィールを更新したよ' : `ようこそ、${nickname}さん！`);
    });

    // プロフィール変更
    document.getElementById('btn-edit-profile')?.addEventListener('click', () => {
      document.getElementById('nickname-input').value = currentProfile?.nickname || '';
      selectedEmoji = currentProfile?.avatar_emoji || '😊';
      document.querySelectorAll('.emoji-option').forEach(b => {
        b.classList.toggle('selected', b.dataset.emoji === selectedEmoji);
      });
      document.getElementById('nickname-modal').classList.add('show');
    });

    // ===== ローディング =====
    function hideLoading() {
      document.getElementById('loading-screen').classList.add('hidden');
    }

    // ===== 写真アップロード =====
    let hungrySelectedFile = null;
    let fullSelectedFile = null;

    function setupPhotoInput(fileInputId, uploadAreaId, previewId, type) {
      const fileInput = document.getElementById(fileInputId);
      const uploadArea = document.getElementById(uploadAreaId);
      const previewArea = document.getElementById(previewId);

      fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;

        // 5MB制限
        if (file.size > 5 * 1024 * 1024) {
          showToast('写真は5MB以下にしてね！');
          fileInput.value = '';
          return;
        }

        if (type === 'hungry') hungrySelectedFile = file;
        else fullSelectedFile = file;

        // プレビュー表示
        const reader = new FileReader();
        reader.onload = (ev) => {
          uploadArea.style.display = 'none';
          previewArea.style.display = 'block';
          previewArea.innerHTML = `
            <div class="photo-preview-container">
              <img src="${ev.target.result}" class="photo-preview">
              <button class="photo-remove" onclick="removePhoto('${type}', '${fileInputId}', '${uploadAreaId}', '${previewId}')">✕</button>
            </div>
          `;
        };
        reader.readAsDataURL(file);
      });
    }

    function removePhoto(type, fileInputId, uploadAreaId, previewId) {
      if (type === 'hungry') hungrySelectedFile = null;
      else fullSelectedFile = null;
      document.getElementById(fileInputId).value = '';
      document.getElementById(uploadAreaId).style.display = '';
      document.getElementById(previewId).style.display = 'none';
      document.getElementById(previewId).innerHTML = '';
    }

    async function uploadPhoto(file) {
      if (!file) return null;
      const ext = file.name.split('.').pop();
      const path = `${currentUser.id}/${Date.now()}.${ext}`;
      const { error } = await db.storage.from('post-images').upload(path, file);
      if (error) {
        console.error('upload error:', error);
        throw error;
      }
      const { data: urlData } = db.storage.from('post-images').getPublicUrl(path);
      return urlData.publicUrl;
    }

    // 初期化
    setupPhotoInput('hungry-file-input', 'hungry-photo-upload', 'hungry-photo-preview', 'hungry');
    setupPhotoInput('full-file-input', 'full-photo-upload', 'full-photo-preview', 'full');

    // ===== 投稿データの読み込み =====
    async function loadPosts() {
      // 投稿を取得（profilesをjoin）
      const { data: postsData, error } = await db
        .from('posts')
        .select('*, profiles(nickname, avatar_emoji)')
        .order('created_at', { ascending: false })
        .limit(50);

      if (error) {
        console.error('posts load error:', error);
        return;
      }

      // リアクション集計を取得
      const postIds = postsData.map(p => p.id);
      let reactionsMap = {};

      if (postIds.length > 0) {
        const { data: reactionsData } = await db
          .from('reactions')
          .select('post_id, emoji, target, user_id')
          .in('post_id', postIds);

        if (reactionsData) {
          for (const r of reactionsData) {
            const key = `${r.post_id}_${r.target}_${r.emoji}`;
            if (!reactionsMap[key]) {
              reactionsMap[key] = { emoji: r.emoji, target: r.target, postId: r.post_id, count: 0, myReaction: false };
            }
            reactionsMap[key].count++;
            if (r.user_id === currentUser.id) {
              reactionsMap[key].myReaction = true;
            }
          }
        }
      }

      // 投稿データを整形
      posts = postsData.map(p => {
        const hungryReactions = Object.values(reactionsMap)
          .filter(r => r.postId === p.id && r.target === 'hungry');
        const fullReactions = Object.values(reactionsMap)
          .filter(r => r.postId === p.id && r.target === 'full');

        return {
          id: p.id,
          userId: p.user_id,
          nickname: p.profiles?.nickname || '名無し',
          avatar: p.profiles?.avatar_emoji || '😊',
          status: p.status,
          hungryText: p.hungry_text,
          hungryAt: p.hungry_at,
          hungryImageUrl: p.hungry_image_url,
          fullText: p.full_text,
          fullAt: p.full_at,
          fullImageUrl: p.full_image_url,
          reactions: {
            hungry: hungryReactions,
            full: fullReactions,
          }
        };
      });

      // 自分の空腹中投稿を探す
      const myHungryPost = posts.find(p => p.userId === currentUser.id && p.status === 'hungry');
      myHungryPostId = myHungryPost?.id || null;

      renderTimeline();
      if (currentPage === 'page-mypage') renderMyPage();
    }

    // ===== リアクションスタンプのHTML =====
    const HUNGRY_STAMPS = [
      { emoji: '😭', label: 'わかる〜' },
      { emoji: '💪', label: 'がんばれ！' },
    ];
    const FULL_STAMPS = [
      { emoji: '🍚', label: 'おいしそう！' },
      { emoji: '😋', label: 'よかったね！' },
    ];

    function renderReactions(reactions, target, postId) {
      const stamps = target === 'hungry' ? HUNGRY_STAMPS : FULL_STAMPS;
      return `<div class="reactions">${stamps.map(stamp => {
        const existing = reactions[target]?.find(r => r.emoji === stamp.emoji);
        const count = existing?.count || 0;
        const reacted = existing?.myReaction ? 'reacted' : '';
        return `<button class="reaction-btn ${reacted}" onclick="toggleReaction('${postId}', '${stamp.emoji}', '${target}', this)">
          <span>${stamp.emoji}</span>
          <span class="reaction-count">${count}</span>
        </button>`;
      }).join('')}</div>`;
    }

    // ===== リアクション送信 =====
    async function toggleReaction(postId, emoji, target, btn) {
      if (btn.disabled) return;
      const isReacted = btn.classList.contains('reacted');
      const countEl = btn.querySelector('.reaction-count');
      let count = parseInt(countEl.textContent);

      btn.disabled = true;

      try {
        if (isReacted) {
          const { error } = await db.from('reactions')
            .delete()
            .eq('post_id', postId)
            .eq('user_id', currentUser.id)
            .eq('emoji', emoji)
            .eq('target', target);

          if (error) throw error;
          btn.classList.remove('reacted');
          countEl.textContent = Math.max(0, count - 1);
        } else {
          const { error } = await db.from('reactions').insert({
            post_id: postId,
            user_id: currentUser.id,
            emoji: emoji,
            target: target,
          });

          if (error) throw error;
          btn.classList.add('reacted');
          countEl.textContent = count + 1;
        }
      } catch (error) {
        showToast('リアクションに失敗しました...');
        console.error(error);
      } finally {
        btn.disabled = false;
      }
    }

    // ===== カードのHTML生成 =====

    // 画像表示ヘルパー
    function renderImage(url) {
      if (!url) return '';
      return `<img src="${url}" class="card-image" loading="lazy">`;
    }

    // 削除ボタン（自分の投稿のみ表示）
    function renderDeleteBtn(post) {
      if (post.userId !== currentUser?.id) return '';
      return `<button class="card-delete" onclick="deletePost('${post.id}')" title="削除">✕</button>`;
    }

    // はらぺこモード用
    function renderHungryCard(post) {
      return `
        <div class="card card-hungry">
          <div class="card-user">
            <div class="card-avatar">${post.avatar}</div>
            <div class="card-nickname">${post.nickname}</div>
            <div class="card-time">${timeAgo(post.hungryAt)}</div>
            ${renderDeleteBtn(post)}
          </div>
          <span class="status-badge badge-hungry">🍚 空腹中</span>
          <div class="card-text card-hungry-text">${post.hungryText}</div>
          ${renderImage(post.hungryImageUrl)}
          <div class="elapsed-time">⏱ ${timeAgo(post.hungryAt)}から空腹中...</div>
          ${renderReactions(post.reactions, 'hungry', post.id)}
        </div>
      `;
    }

    // まんぷくモード用
    function renderFullCard(post) {
      return `
        <div class="card card-full">
          <div class="card-user">
            <div class="card-avatar">${post.avatar}</div>
            <div class="card-nickname">${post.nickname}</div>
            <div class="card-time">${timeAgo(post.fullAt)}</div>
            ${renderDeleteBtn(post)}
          </div>
          <span class="status-badge badge-full">😋 満腹！</span>
          <div class="card-text">${post.fullText}</div>
          ${renderImage(post.fullImageUrl)}
          ${renderReactions(post.reactions, 'full', post.id)}
        </div>
      `;
    }

    // ループモード用：未完
    function renderLoopPendingCard(post) {
      return `
        <div class="card card-loop-pending">
          <div class="card-user">
            <div class="card-avatar">${post.avatar}</div>
            <div class="card-nickname">${post.nickname}</div>
            <div class="card-time">${timeAgo(post.hungryAt)}</div>
            ${renderDeleteBtn(post)}
          </div>
          <div class="loop-pair">
            <div class="loop-step loop-step-hungry">
              <div class="loop-step-label">🍚 空腹中</div>
              <div class="loop-step-text">${post.hungryText}</div>
              ${renderImage(post.hungryImageUrl)}
            </div>
            <div class="loop-arrow">↓</div>
            <div class="loop-step loop-step-full" style="opacity: 0.25; border: 2px dashed #E0E0E0; background: rgba(0,0,0,0.02);">
              <div class="loop-step-label" style="color: #CCC;">😵 ・・・</div>
            </div>
          </div>
          <div class="loop-pending-footer">
            <span class="loop-pending-dots"><span></span><span></span><span></span></span>
            ⏱ ${timeAgo(post.hungryAt)}から空腹中...
          </div>
          ${renderReactions(post.reactions, 'hungry', post.id)}
        </div>
      `;
    }

    // ループモード用：完成
    function renderLoopCompleteCard(post) {
      const hungryTime = new Date(post.hungryAt);
      const fullTime = new Date(post.fullAt);
      const durationMs = fullTime - hungryTime;
      const durationMin = Math.floor(durationMs / 60000);
      let durationText = '';
      if (durationMin < 60) {
        durationText = `${durationMin}分で満腹に`;
      } else {
        const h = Math.floor(durationMin / 60);
        const m = durationMin % 60;
        durationText = m > 0 ? `${h}時間${m}分で満腹に` : `${h}時間で満腹に`;
      }

      return `
        <div class="card card-full card-loop-complete">
          <div class="card-user">
            <div class="card-avatar">${post.avatar}</div>
            <div class="card-nickname">${post.nickname}</div>
            <div class="card-time">${timeAgo(post.fullAt)}</div>
            ${renderDeleteBtn(post)}
          </div>
          <div class="loop-complete-header">🔄 ループ完成！</div>
          <div class="loop-pair">
            <div class="loop-step loop-step-hungry">
              <div class="loop-step-label">🍚 空腹だった時</div>
              <div class="loop-step-text">${post.hungryText}</div>
              ${renderImage(post.hungryImageUrl)}
            </div>
            <div class="loop-arrow">↓</div>
            <div class="loop-duration">⏱ ${durationText}</div>
            <div class="loop-step loop-step-full">
              <div class="loop-step-label">😋 満腹になった！</div>
              <div class="loop-step-text">${post.fullText}</div>
              ${renderImage(post.fullImageUrl)}
            </div>
          </div>
          ${renderReactions(post.reactions, 'full', post.id)}
        </div>
      `;
    }

    // ===== モードカウント更新 =====
    function updateModeCounts() {
      document.getElementById('count-loop').textContent = posts.length;
      document.getElementById('count-hungry').textContent = posts.filter(p => p.status === 'hungry').length;
      document.getElementById('count-full').textContent = posts.filter(p => p.status === 'full').length;
    }

    // ===== タイムライン描画 =====
    function renderTimeline() {
      const timeline = document.getElementById('timeline');
      let filtered = [];

      if (currentMode === 'hungry') {
        filtered = posts.filter(p => p.status === 'hungry');
      } else if (currentMode === 'full') {
        filtered = posts.filter(p => p.status === 'full');
      } else {
        filtered = [...posts];
      }

      filtered.sort((a, b) => {
        const timeA = new Date(a.status === 'full' ? a.fullAt : a.hungryAt);
        const timeB = new Date(b.status === 'full' ? b.fullAt : b.hungryAt);
        return timeB - timeA;
      });

      updateModeCounts();

      if (filtered.length === 0) {
        timeline.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">🍽️</div>
            <div class="empty-state-text">まだ投稿がないよ<br>最初のループを始めよう！</div>
          </div>
        `;
        return;
      }

      timeline.innerHTML = filtered.map(post => {
        if (currentMode === 'hungry') return renderHungryCard(post);
        if (currentMode === 'full') return renderFullCard(post);
        return post.status === 'hungry' ? renderLoopPendingCard(post) : renderLoopCompleteCard(post);
      }).join('');
    }

    // ===== マイページ描画 =====
    function renderMyPage() {
      const myPosts = posts.filter(p => p.userId === currentUser?.id);
      const myTimeline = document.getElementById('my-timeline');

      document.getElementById('my-loop-count').textContent = myPosts.filter(p => p.status === 'full').length;
      document.getElementById('my-hungry-count').textContent = myPosts.filter(p => p.status === 'hungry').length;

      if (myPosts.length === 0) {
        myTimeline.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">📝</div>
            <div class="empty-state-text">まだ投稿がないよ。<br>最初のループを始めよう！</div>
          </div>
        `;
        return;
      }

      myPosts.sort((a, b) => {
        const timeA = new Date(a.status === 'full' ? a.fullAt : a.hungryAt);
        const timeB = new Date(b.status === 'full' ? b.fullAt : b.hungryAt);
        return timeB - timeA;
      });

      myTimeline.innerHTML = myPosts.map(post =>
        post.status === 'hungry' ? renderLoopPendingCard(post) : renderLoopCompleteCard(post)
      ).join('');
    }

    // ===== モード説明文 =====
    const MODE_DESCRIPTIONS = {
      loop: '空腹→満腹の気持ちの変化を楽しむモード',
      hungry: 'お腹ペコペコな人たちを眺めて共感するモード',
      full: '満腹で幸せそうな人たちを眺めるモード',
    };

    function updateModeDescription() {
      const el = document.getElementById('mode-description');
      el.style.opacity = '0';
      setTimeout(() => {
        el.textContent = MODE_DESCRIPTIONS[currentMode];
        el.style.opacity = '1';
      }, 150);
    }

    // ===== モード切替（アニメーション付き） =====
    const MODES = ['loop', 'hungry', 'full'];

    function switchMode(newMode, direction) {
      if (newMode === currentMode || isModeSwitching) return;
      isModeSwitching = true;
      const timeline = document.getElementById('timeline');
      timeline.classList.remove('slide-left', 'slide-right', 'slide-in-left', 'slide-in-right');

      // スライドアウト
      const outClass = direction === 'left' ? 'slide-left' : 'slide-right';
      timeline.classList.add(outClass);

      setTimeout(() => {
        // モード変更 & 再描画
        currentMode = newMode;
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        document.querySelector(`.mode-btn[data-mode="${newMode}"]`).classList.add('active');
        updateModeDescription();
        renderTimeline();

        // スライドイン
        timeline.classList.remove(outClass);
        const inClass = direction === 'left' ? 'slide-in-left' : 'slide-in-right';
        timeline.classList.add(inClass);
        setTimeout(() => {
          timeline.classList.remove(inClass);
          isModeSwitching = false;
        }, 250);
      }, 250);
    }

    // ボタンクリックでの切替
    document.querySelectorAll('.mode-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const newMode = btn.dataset.mode;
        if (newMode === currentMode) return;
        const oldIndex = MODES.indexOf(currentMode);
        const newIndex = MODES.indexOf(newMode);
        switchMode(newMode, newIndex > oldIndex ? 'left' : 'right');
      });
    });

    // ===== スワイプでモード切替 =====
    let touchStartX = 0;
    let touchStartY = 0;
    let isSwiping = false;

    const timelinePage = document.getElementById('page-timeline');

    timelinePage.addEventListener('touchstart', (e) => {
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
      isSwiping = true;
    }, { passive: true });

    timelinePage.addEventListener('touchmove', (e) => {
      if (!isSwiping) return;
      // 縦スクロール中はスワイプ無効にする
      const diffY = Math.abs(e.touches[0].clientY - touchStartY);
      const diffX = Math.abs(e.touches[0].clientX - touchStartX);
      if (diffY > diffX) isSwiping = false;
    }, { passive: true });

    timelinePage.addEventListener('touchend', (e) => {
      if (!isSwiping) return;
      isSwiping = false;
      const diffX = e.changedTouches[0].clientX - touchStartX;
      if (Math.abs(diffX) < 60) return; // 60px未満は無視

      const currentIndex = MODES.indexOf(currentMode);
      if (diffX < 0 && currentIndex < MODES.length - 1) {
        // 左スワイプ → 次のモード
        switchMode(MODES[currentIndex + 1], 'left');
      } else if (diffX > 0 && currentIndex > 0) {
        // 右スワイプ → 前のモード
        switchMode(MODES[currentIndex - 1], 'right');
      }
    }, { passive: true });

    // ===== タブ切替 =====
    document.querySelectorAll('.nav-btn[data-page]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(btn.dataset.page).classList.add('active');
        currentPage = btn.dataset.page;
        if (currentPage === 'page-mypage') renderMyPage();
      });
    });

    // ===== 投稿モーダル =====
    const modalOverlay = document.getElementById('modal-overlay');
    const formHungry = document.getElementById('form-hungry');
    const formFull = document.getElementById('form-full');

    document.getElementById('btn-open-post').addEventListener('click', () => {
      if (myHungryPostId) {
        formHungry.style.display = 'none';
        formFull.style.display = 'block';
      } else {
        formHungry.style.display = 'block';
        formFull.style.display = 'none';
      }
      modalOverlay.classList.add('show');
    });

    function closeModal() {
      modalOverlay.classList.remove('show');
      document.getElementById('hungry-text').value = '';
      document.getElementById('full-text').value = '';
      document.getElementById('hungry-char-count').textContent = '0';
      document.getElementById('full-char-count').textContent = '0';
      // 写真プレビューをリセット
      removePhoto('hungry', 'hungry-file-input', 'hungry-photo-upload', 'hungry-photo-preview');
      removePhoto('full', 'full-file-input', 'full-photo-upload', 'full-photo-preview');
    }

    modalOverlay.addEventListener('click', (e) => {
      if (e.target === modalOverlay) closeModal();
    });
    document.getElementById('btn-cancel-hungry').addEventListener('click', closeModal);
    document.getElementById('btn-cancel-full').addEventListener('click', closeModal);

    // 文字数カウント
    document.getElementById('hungry-text').addEventListener('input', (e) => {
      const count = e.target.value.length;
      const el = document.getElementById('hungry-char-count');
      el.textContent = count;
      el.parentElement.classList.toggle('over', count > 140);
    });
    document.getElementById('full-text').addEventListener('input', (e) => {
      const count = e.target.value.length;
      const el = document.getElementById('full-char-count');
      el.textContent = count;
      el.parentElement.classList.toggle('over', count > 140);
    });

    // ===== 空腹投稿（DB保存） =====
    document.getElementById('btn-post-hungry').addEventListener('click', async () => {
      const text = document.getElementById('hungry-text').value.trim();
      if (!text) { showToast('テキストを入力してね！'); return; }
      if (text.length > 140) { showToast('140文字以内にしてね！'); return; }
      if (myHungryPostId) { showToast('先に今の空腹投稿を満腹にしてね！'); return; }

      const btn = document.getElementById('btn-post-hungry');
      btn.disabled = true;
      btn.textContent = 'アップロード中...';

      try {
        const imageUrl = await uploadPhoto(hungrySelectedFile);

        const { error } = await db.from('posts').insert({
          user_id: currentUser.id,
          status: 'hungry',
          hungry_text: text,
          hungry_image_url: imageUrl,
          hungry_at: new Date().toISOString(),
        });

        if (error) throw error;

        hungrySelectedFile = null;
        closeModal();
        await loadPosts();
        showToast('🍚 お腹減った！を投稿したよ');
      } catch (error) {
        const message = hungrySelectedFile ? '写真または投稿の保存に失敗しました...' : '投稿に失敗しました...';
        showToast(message);
        console.error(error);
      } finally {
        btn.disabled = false;
        btn.textContent = 'お腹減った！を投稿する 🍚';
      }
    });

    // ===== 満腹投稿（DB更新） =====
    document.getElementById('btn-post-full').addEventListener('click', async () => {
      const text = document.getElementById('full-text').value.trim();
      if (!text) { showToast('テキストを入力してね！'); return; }
      if (text.length > 140) { showToast('140文字以内にしてね！'); return; }
      if (!myHungryPostId) { showToast('先に空腹投稿をしてね！'); closeModal(); return; }

      const btn = document.getElementById('btn-post-full');
      btn.disabled = true;
      btn.textContent = 'アップロード中...';

      try {
        const imageUrl = await uploadPhoto(fullSelectedFile);

        const { error } = await db.from('posts')
          .update({
            status: 'full',
            full_text: text,
            full_image_url: imageUrl,
            full_at: new Date().toISOString(),
          })
          .eq('id', myHungryPostId);

        if (error) throw error;

        fullSelectedFile = null;
        closeModal();
        await loadPosts();
        showToast('😋 ループ完成！満腹になったね！');
      } catch (error) {
        const message = fullSelectedFile ? '写真または投稿の保存に失敗しました...' : '投稿に失敗しました...';
        showToast(message);
        console.error(error);
      } finally {
        btn.disabled = false;
        btn.textContent = '満腹になった！を投稿する 😋';
      }
    });

    // ===== 投稿削除 =====
    async function deletePost(postId) {
      if (!confirm('この投稿を削除しますか？')) return;

      const { error } = await db.from('posts')
        .delete()
        .eq('id', postId)
        .eq('user_id', currentUser.id);

      if (error) {
        showToast('削除に失敗しました...');
        console.error(error);
        return;
      }

      await loadPosts();
      showToast('投稿を削除しました');
    }

    // ===== ログアウト =====
    document.getElementById('btn-logout')?.addEventListener('click', async () => {
      if (!confirm('ログアウトするとアプリ内データは削除されます。よろしいですか？')) return;

      const { error } = await db.from('profiles')
        .delete()
        .eq('id', currentUser.id);

      if (error) {
        showToast('データ削除に失敗しました...');
        console.error(error);
        return;
      }

      await db.auth.signOut();
      currentUser = null;
      currentProfile = null;
      posts = [];
      myHungryPostId = null;
      location.reload();
    });

    // ===== アプリ起動 =====
    initAuth();
  </script>
</body>
</html>
